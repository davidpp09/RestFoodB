spring.application.name=Rest Api
server.port=8080
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/restaurante?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Con Flyway activo, Hibernate NO debe modificar el esquema en prod (evita ALTER destructivos)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
api.security.secret=${JWT_SECRET}
springdoc.override-with-generic-response=false

# Orígenes permitidos para CORS/WebSocket (patrón). En prod cambia por tu IP/dominio.
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://192.168.*.*:*}

# Configuración de impresoras locales (USB para desarrollo)
# Para migrar a TCP/IP: solo cambiar ImpresoraService.abrirConexionUsb → abrirConexionSocket(ip, puerto)
impresora.cocina1.nombre=POS-58 (1)
impresora.cocina2.nombre=POS-58 (1)
impresora.tickets.nombre=POS-58 (1)

