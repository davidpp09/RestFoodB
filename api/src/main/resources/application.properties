spring.application.name=Rest Api
server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/restaurante?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
api.security.secret=${JWT_SECRET}
springdoc.override-with-generic-response=false

# Configuración de impresoras locales (USB para desarrollo)
# Para migrar a TCP/IP: solo cambiar ImpresoraService.abrirConexionUsb → abrirConexionSocket(ip, puerto)
impresora.cocina1.nombre=POS-58 (1)
impresora.cocina2.nombre=POS-58 (1)
impresora.tickets.nombre=POS-58 (1)

